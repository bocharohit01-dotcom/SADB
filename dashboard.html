<!DOCTYPE html>
<html>
<head>
    <style>
        /* KEEPING YOUR ORIGINAL CSS EXACTLY */
        body { font-family: Arial; margin: 0; background-color: #f4f6f9; }
        .header { background-color: #007BFF; color: white; padding: 15px; text-align: center; font-size: 22px; }
        .sidebar { width: 200px; height: 100vh; background-color: #2c3e50; color: white; position: fixed; padding-top: 20px; }
        .sidebar a, .dropdown-btn { display: block; padding: 10px; color: white; text-decoration: none; background: none; border: none; width: 100%; text-align: left; cursor: pointer; font-size: 16px; box-sizing: border-box; }
        .sidebar a:hover, .dropdown-btn:hover { background-color: #34495e; }
        .dropdown-container { display: none; background-color: #243445; }
        .dropdown-container a { padding-left: 25px; }
        .main { margin-left: 200px; padding: 20px; }
        .card { background: white; padding: 20px; margin: 10px; display: inline-block; width: 200px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stats { font-size: 2em; color: #007BFF; font-weight: bold; margin: 0; }
        .top-info { padding: 15px 20px; background: white; }
    </style>
</head>
<body>

    <div class="top-info">
        <h3 id="welcome-text" style="margin: 0 0 8px 0;">Welcome 🎉</h3>
        <p id="user-info" style="margin: 0;"></p>
    </div>

    <div class="header">Student achievement Dashboard</div>

    <div class="sidebar">
        <a href="#">Home</a>
        <button class="dropdown-btn" onclick="toggleDropdown()">Upload ▾</button>
        <div class="dropdown-container" id="uploadMenu">
            <a href="upload.html">Certificate</a>
            <a href="project.html">Project</a>
            <a href="uploadinternship.html">Internship</a>
            <a href="uploadresume.html">Resume</a>
        </div>
        <a href="view.html">View Achievements</a>
        <a href="view profile.html">Profile</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>

    <div class="main">
        <!-- Student Notifications -->
        <div style="background:white; padding:12px; border-radius:8px; margin-bottom:12px;">
            <h4 style="margin:0 0 8px 0;">Announcements</h4>
            <div id="studentNotifList" style="max-height:160px; overflow:auto; color:#333;">
                <div style="color:#666;">No notifications</div>
            </div>
        </div>
        <div class="card">
            <h3 class="stats" id="cert-count">0</h3>
            <p>Certificates</p>
        </div>
        <div class="card">
            <h3 class="stats" id="proj-count">0</h3>
            <p>Projects</p>
        </div>
        <div class="card">
            <h3 class="stats" id="intern-count">0</h3>
            <p>Internships</p>
        </div>
    </div>

    <script>
        function toggleDropdown() {
            let menu = document.getElementById('uploadMenu');
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        }

        function escapeHTML(str) {
            if (!str) return '';
            return String(str).replace(/[&<>'"]/g, function(tag) {
                return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag);
            });
        }

        function loadProfile() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            let role = localStorage.getItem('role') || (currentUser && currentUser.role) || '';

            if (!currentUser || !currentUser.email) {
                window.location.href = 'login.html';
                return;
            }

            if (role !== 'student') {
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                const storedUser = users.find(u => u.email === currentUser.email);
                if (storedUser && storedUser.role === 'student') {
                    role = 'student';
                    localStorage.setItem('role', 'student');
                } else {
                    window.location.href = 'login.html';
                    return;
                }
            }

            let allProfiles = JSON.parse(localStorage.getItem('studentProfiles')) || [];
            let myProfile = allProfiles.find(p => p.email === currentUser.email) || currentUser;

            document.getElementById('welcome-text').innerText = myProfile.name ? 'Welcome, ' + myProfile.name + ' 🎉' : 'Welcome, ' + currentUser.email + ' 🎉';
            window.currentPID = myProfile.pid || myProfile.clgId || '';
            document.getElementById('user-info').innerText = (myProfile.pid || myProfile.clgId) ? 'ID: ' + (myProfile.pid || myProfile.clgId) + ' | Email: ' + currentUser.email : currentUser.email;
        }

        function loadStats() {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) return;

            const certs = JSON.parse(localStorage.getItem('certificates')) || [];
            const projs = JSON.parse(localStorage.getItem('projects')) || [];
            const interns = JSON.parse(localStorage.getItem('internships')) || [];

            // FILTER LOGIC FOR CERTIFICATES
            // We check for clgId (from upload.html) or userEmail
            let myCerts = certs.filter(item => {
                return item.clgId === window.currentPID || 
                       item.userEmail === currentUser.email ||
                       item.pid === window.currentPID;
            });

            // FILTER LOGIC FOR PROJECTS
            let myProjs = projs.filter(item => {
                return item.userEmail === currentUser.email || 
                       item.clgId === window.currentPID;
            });

            // FILTER LOGIC FOR INTERNSHIPS
            let myInterns = interns.filter(item => {
                return item.userEmail === currentUser.email || 
                       item.clgId === window.currentPID;
            });

            document.getElementById('cert-count').innerText = myCerts.length;
            document.getElementById('proj-count').innerText = myProjs.length;
            document.getElementById('intern-count').innerText = myInterns.length;
        }

        function loadStudentNotifications() {
            const raw = JSON.parse(localStorage.getItem('notifications') || '[]');
            const list = document.getElementById('studentNotifList');
            if (!list) return;
            if (!raw.length) { list.innerHTML = '<div style="color:#666;">No notifications</div>'; return; }
            list.innerHTML = raw.slice().reverse().map(n => {
                return `<div style="padding:10px; border-bottom:1px solid #eee;"><div style="font-weight:700;">${escapeHTML(n.message)}</div><div style="font-size:12px;color:#666;margin-top:6px;">${escapeHTML(n.date)}${n.author? ' • ' + escapeHTML(n.author):''}</div></div>`;
            }).join('');
        }

        function logout() {
            localStorage.removeItem('currentUser');
            localStorage.removeItem('role');
            window.location.href = 'login.html';
        }

        window.onload = function() {
            loadProfile(); // Load profile first to get the PID
            loadStats();   // Then load stats
            loadStudentNotifications(); // Load announcements
        };
    </script>
</body>
</html>
