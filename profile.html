

<!DOCTYPE html>
<html>
<head>
    <title>Profile Details</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .box {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 340px;
            text-align: center;
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
        }
        button {
            padding: 10px;
            width: 90%;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
        }
        .msg {
            margin-top: 10px;
            color: green;
        }
        #profilePic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
            border: 2px solid #ddd;
        }
    </style>
</head>
<body>
<div class="box">
    <h2>Details</h2>
    
    <!-- Profile Pic -->
    <img id="profilePic" src="https://via.placeholder.com/100/007BFF/ffffff?text=👤">
    <input type="file" id="photo" accept="image/*">
    
    <!-- Personal ID -->
    <p><b>Personal ID:</b></p>
    <input type="text" id="pid" placeholder="Enter your ID"
           onkeydown="moveNext(event, 'name')">
    
    <!-- Inputs -->
    <input type="text" id="name" placeholder="Full Name"
           onkeydown="moveNext(event, 'clgId')">
    <input type="text" id="clgId" placeholder="College ID"
           onkeydown="moveNext(event, 'email')">
    <input type="email" id="email" placeholder="College Email"
           onkeydown="moveNext(event, 'year')">
    <input type="text" id="year" placeholder="Year"
           onkeydown="handleLast(event)">
    
    <button onclick="saveProfile()">Save Details</button>
    <div class="msg" id="msg"></div>
</div>
<script>
function moveNext(event, nextId) {
    if (event.key === "Enter") {
        event.preventDefault();
        document.getElementById(nextId).focus();
    }
}
function handleLast(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        saveProfile();
    }
}
function saveProfile() {
    let pid = document.getElementById("pid").value;
    let name = document.getElementById("name").value;
    let clgId = document.getElementById("clgId").value;
    let email = document.getElementById("email").value;
    let year = document.getElementById("year").value;
    let photo = document.getElementById("profilePic").src;
    let msgBox = document.getElementById("msg");
    if (pid === "" || name === "" || clgId === "" || email === "" || year === "") {
        alert("Please fill all fields");
        return;
    }
    let profile = { pid, name, clgId, email, year, photo };
    localStorage.setItem("profile", JSON.stringify(profile));
    msgBox.innerText = "Details saved successfully!";
}
function loadProfile() {
    let profile = JSON.parse(localStorage.getItem("profile")) || {};
    document.getElementById("pid").value = profile.pid || "";
    document.getElementById("name").value = profile.name || "";
    document.getElementById("clgId").value = profile.clgId || "";
    document.getElementById("email").value = profile.email || "";
    document.getElementById("year").value = profile.year || "";
    if (profile.photo) {
        document.getElementById("profilePic").src = profile.photo;
    }
}

// Handle photo upload
document.getElementById('photo').addEventListener('change', function(e) {
    let file = e.target.files[0];
    if (file) {
        let reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById("profilePic").src = e.target.result;
        }
        reader.readAsDataURL(file);
    }
});
loadProfile();
</script>
</body>
</html>
