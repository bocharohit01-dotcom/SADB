<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Achievements - Student Portal</title>
    <style>
        :root {
            --primary: #007BFF;
            --dark: #2c3e50;
            --bg: #f4f6f9;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --text-main: #333;
            --text-muted: #666;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background-color: var(--bg); 
            display: flex;
            min-height: 100vh;
        }
        
        /* Sidebar Styles */
        .sidebar { 
            width: 240px; 
            background-color: var(--dark); 
            color: white; 
            position: fixed; 
            height: 100vh;
            padding-top: 20px; 
            z-index: 100;
        }
        .sidebar a { 
            display: block; 
            padding: 15px 25px; 
            color: #ecf0f1; 
            text-decoration: none; 
            transition: 0.3s; 
            font-size: 15px;
        }
        .sidebar a:hover { background-color: #34495e; padding-left: 35px; }
        .sidebar .active { background-color: var(--primary); border-left: 5px solid #fff; }

        /* Main Content Area */
        .main { 
            margin-left: 240px; 
            width: calc(100% - 240px); 
            padding: 40px; 
            box-sizing: border-box; 
        }
        .header-title { 
            margin-bottom: 30px; 
            border-bottom: 2px solid #ddd; 
            padding-bottom: 15px; 
            color: var(--dark);
            font-size: 28px;
        }

        .category-section { margin-bottom: 50px; }
        .category-title { 
            font-size: 20px; 
            font-weight: bold; 
            color: var(--primary); 
            margin-bottom: 20px; 
            display: flex; 
            align-items: center; 
        }
        .category-title::after { 
            content: ""; 
            flex: 1; 
            height: 1px; 
            background: #ccc; 
            margin-left: 15px; 
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 25px; 
        }
        .card { 
            background: white; 
            border-radius: 12px; 
            padding: 25px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s; 
            border: 1px solid #eee;
            display: flex;
            flex-direction: column;
            min-height: 180px; /* Ensures space for the delete link */
        }
        .card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .status-badge { 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            padding: 5px 12px; 
            border-radius: 20px; 
            font-size: 11px; 
            font-weight: bold; 
            text-transform: uppercase; 
        }
        .pending { background: #fff3cd; color: #856404; }
        .approved { background: #d4edda; color: #155724; }
        .rejected { background: #f8d7da; color: #721c24; }

        /* Updated Red Delete Option Styles */
        .delete-opt {
            position: absolute;
            bottom: 15px;
            right: 15px;
            color: var(--danger);
            font-size: 13px;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            padding: 5px;
            transition: opacity 0.2s;
            border: none;
            background: none;
        }
        .delete-opt:hover {
            text-decoration: underline;
            opacity: 0.8;
        }

        .card-title { 
            font-size: 18px; 
            color: var(--text-main); 
            margin: 10px 0; 
            font-weight: 700; 
            padding-right: 60px; 
        }
        
        .card-date {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .feedback-area { 
            margin-top: auto; 
            padding: 12px; 
            background: #fff5f5; 
            border-radius: 8px; 
            border: 1px solid #fad2d2; 
            margin-bottom: 25px; /* Leave space for delete button */
        }
        .feedback-label { 
            color: var(--danger); 
            font-size: 11px; 
            font-weight: 900; 
            margin-bottom: 6px; 
            display: block; 
        }
        .feedback-msg { 
            color: #444; 
            font-size: 13px; 
            font-style: italic; 
        }

        .empty-msg { 
            color: #999; 
            font-style: italic; 
            padding: 20px; 
            background: rgba(255,255,255,0.5);
            border-radius: 8px;
            text-align: center;
            grid-column: 1 / -1;
        }

        @media (max-width: 768px) {
            .sidebar { width: 70px; }
            .sidebar a span { display: none; }
            .main { margin-left: 70px; width: calc(100% - 70px); padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <a href="dashboard.html">🏠 <span>Dashboard</span></a>
        <a href="view.html" class="active">👁️ <span>View Achievements</span></a>
        <a href="profile.html">👤 <span>Profile</span></a>
        <div style="margin-top: 40px; border-top: 1px solid #444; padding-top: 10px;">
            <a href="#" onclick="logout()" style="color: #ff7675;">🚪 <span>Logout</span></a>
        </div>
    </div>

    <div class="main">
        <h1 class="header-title">My Achievement Records</h1>

        <div class="category-section">
            <div class="category-title">📜 Certificates</div>
            <div id="certs-grid" class="grid"></div>
        </div>

        <div class="category-section">
            <div class="category-title">🚀 Projects</div>
            <div id="projs-grid" class="grid"></div>
        </div>

        <div class="category-section">
            <div class="category-title">💼 Internships</div>
            <div id="interns-grid" class="grid"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', loadData);

        function loadData() {
            renderCategory('certificates', 'certs-grid');
            renderCategory('projects', 'projs-grid');
            renderCategory('internships', 'interns-grid');
        }

        function renderCategory(storageKey, gridId) {
            const data = JSON.parse(localStorage.getItem(storageKey) || "[]");
            const grid = document.getElementById(gridId);

            if (data.length === 0) {
                grid.innerHTML = `<div class="empty-msg">No ${storageKey} found in your records.</div>`;
                return;
            }

            grid.innerHTML = data.map((item, index) => {
                const rawStatus = item.status || item.statusBadge || 'pending';
                const status = rawStatus.toLowerCase();
                
                const displayName = item.title || 
                                    item.projectName || 
                                    item.certificateName || 
                                    item.companyName || 
                                    item.name || 
                                    "Unnamed Achievement";

                const displayDate = item.date || item.uploadDate || "Date not provided";

                const feedbackHtml = (status === 'rejected' && item.feedback) ? `
                    <div class="feedback-area">
                        <span class="feedback-label">FACULTY FEEDBACK:</span>
                        <span class="feedback-msg">"${item.feedback}"</span>
                    </div>
                ` : '';

                return `
                    <div class="card">
                        <span class="status-badge ${status}">${status}</span>
                        <div class="card-title">${displayName}</div>
                        <div class="card-date">
                            <span>📅</span> ${displayDate}
                        </div>
                        ${feedbackHtml}
                        
                        <!-- Red Delete Option Text -->
                        <button class="delete-opt" onclick="deleteItem('${storageKey}', ${index})">
                            Delete
                        </button>
                    </div>
                `;
            }).join('');
        }

        function deleteItem(storageKey, index) {
            if (confirm("Are you sure you want to delete this " + storageKey.slice(0, -1) + "?")) {
                let data = JSON.parse(localStorage.getItem(storageKey) || "[]");
                data.splice(index, 1);
                localStorage.setItem(storageKey, JSON.stringify(data));
                loadData();
            }
        }

        function logout() {
            if(confirm("Are you sure you want to logout?")) {
                localStorage.removeItem('role');
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
