<!DOCTYPE html>
<html>
<head>
    <title>Login - Student Portal</title>
    <style>
        /* YOUR ORIGINAL CSS - NO CHANGES */
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            display: flex;
            gap: 30px;
            max-width: 700px;
            width: 100%;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            flex: 1;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
        }
        .box.student::before { background: #4facfe; }
        .box.faculty::before { background: #ff6b6b; }
        .box h2 {
            margin-top: 0;
            color: #333;
            font-size: 24px;
        }
        label {
            display: block;
            text-align: left;
            margin: 10px 0 5px;
            font-size: 14px;
            color: #555;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 14px;
            margin: 5px 0 10px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
        }
        button {
            width: 100%;
            padding: 14px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        button.faculty-btn { background: #ff6b6b; }
        button:hover:not(:disabled) { 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        #msg {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            display: none;
            font-weight: 500;
        }
        /* Style for sMsg and fMsg which are inside your boxes */
        #sMsg, #fMsg {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            display: none;
            font-weight: 500;
        }
        .success { 
            background: #d4edda; 
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error { 
            background: #f8d7da; 
            color: #721c24;
            border: 1px solid #f5c6cb;
            animation: shake 0.5s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .register-link {
            margin-top: 20px;
            font-size: 14px;
        }
        .register-link a {
            color: #4facfe;
            text-decoration: none;
            font-weight: 600;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
        @media (max-width: 768px) {
            .container { 
                flex-direction: column; 
                gap: 20px; 
            }
            .box { padding: 25px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box student">
            <h2>👨‍🎓 Student</h2>
            <label for="sEmail">Email</label>
            <input type="email" id="sEmail" placeholder="student@college.edu" required>
            <label for="sPass">Password</label>
            <input type="password" id="sPass" placeholder="Enter your password" required>
            <button id="sBtn" onclick="login('student')">Login</button>
            <div id="sMsg"></div>
            <div class="register-link">
                New? <a href="register.html">Create Account</a>
            </div>
        </div>

        <div class="box faculty">
            <h2>👨‍🏫 Faculty</h2>
            <label for="fEmail">Email</label>
            <input type="email" id="fEmail" placeholder="faculty@college.edu" required>
            <label for="fPass">Password</label>
            <input type="password" id="fPass" placeholder="Enter your password" required>
            <button id="fBtn" class="faculty-btn" onclick="login('faculty')">Login</button>
            <div id="fMsg"></div>
            <div class="register-link">
                New? <a href="register.html">Create Account</a>
            </div>
        </div>
    </div>

    <script>
        // HELPERS TO KEEP YOUR ORIGINAL FEEDBACK STYLE
        function showMsg(id, text, isSuccess) {
            const msg = document.getElementById(id);
            const prefix = id.charAt(0); // 's' or 'f'
            const btn = document.getElementById(prefix + 'Btn');

            msg.textContent = text;
            msg.className = isSuccess ? 'success' : 'error';
            msg.style.display = 'block';

            if (isSuccess) {
                btn.disabled = true;
                btn.textContent = 'Redirecting...';
            }

            setTimeout(() => { 
                if (!isSuccess) msg.style.display = 'none';
            }, 4000);
        }

        // UPDATED LOGIN LOGIC
        function login(role) {
            const prefix = role === 'student' ? 's' : 'f';
            const emailInput = document.getElementById(prefix + 'Email');
            const passInput = document.getElementById(prefix + 'Pass');
            const email = emailInput.value.trim();
            const pass = passInput.value;
            const msgId = prefix + 'Msg';

            if (!email || !pass) {
                showMsg(msgId, '⚠️ Please fill all fields', false);
                return;
            }

            // Get the list of users created in register.html
            let users = JSON.parse(localStorage.getItem('users') || '[]');

            // Check if the user exists
            const user = users.find(u => 
                u.email === email && 
                u.password === pass && 
                u.role === role
            );

            if (user) {
                // IMPORTANT: This sets the "Session" for the Dashboard update
                localStorage.setItem('currentUser', JSON.stringify(user));
                localStorage.setItem('role', role);

                showMsg(msgId, '✅ Login successful! Redirecting...', true);

                setTimeout(() => {
                    if (role === 'student') window.location.href = 'dashboard.html';
                    else window.location.href = 'faculty.html';
                }, 1500);
            } else {
                showMsg(msgId, '❌ Invalid credentials', false);
                passInput.value = '';
            }
        }

        // Support Enter Key
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                // Check which box is active or has text
                if(document.activeElement.id.startsWith('s')) login('student');
                else if(document.activeElement.id.startsWith('f')) login('faculty');
            }
        });
    </script>
</body>
</html>
