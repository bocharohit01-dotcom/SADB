<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Certificate</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        input[type="file"] {
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #0056b3;
        }

        .back-btn {
            margin-top: 10px;
            background: gray;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Upload Certificate</h2>

    <form onsubmit="saveCertificate(event)">
        
        <div class="form-group">
            <label>College ID</label>
            <input type="text" id="clgId" required>
        </div>

        <div class="form-group">
            <label>Certificate Title</label>
            <input type="text" id="title" required>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea id="desc" rows="3" required></textarea>
        </div>

        <div class="form-group">
            <label>Upload File</label>
            <input type="file" id="file" accept=".pdf,.jpg,.png" required>
        </div>

        <button type="submit">Submit Certificate</button>
        <button type="button" class="back-btn" onclick="location.href='dashboard.html'">
            Back to Dashboard
        </button>

    </form>
</div>

<script>
function saveCertificate(event) {
    event.preventDefault();

    let clgId = document.getElementById("clgId").value.trim();
    let title = document.getElementById("title").value.trim();
    let desc = document.getElementById("desc").value.trim();
    let fileInput = document.getElementById("file");

    if (!fileInput.files.length) {
        alert("Please upload a certificate file.");
        return;
    }

    let file = fileInput.files[0];

    let profile = JSON.parse(localStorage.getItem("profile")) || {};
    let certificates = JSON.parse(localStorage.getItem("certificates")) || [];

    let reader = new FileReader();

    reader.onload = function () {
        certificates.push({
            clgId: clgId,
            pid: profile.pid || "",
            title: title,
            desc: desc,
            file: reader.result, // storing file as base64
            status: "Pending"
        });

        localStorage.setItem("certificates", JSON.stringify(certificates));

        alert("Certificate uploaded successfully!");
        document.querySelector("form").reset();
    };

    reader.readAsDataURL(file);
}
</script>

</body>
</html>
