<!DOCTYPE html>
<html>
<head>
    <title>Upload Project</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 20px;
        }
        .container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        .form-box, .details-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .form-box {
            width: 330px;
            position: relative;
        }
        .details-box {
            flex: 1;
            min-height: 400px;
        }
        .back-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 6px 10px;
            border: none;
            border-radius: 4px;
            background: #007BFF;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }
        h2 {
            text-align: center;
            margin-top: 30px;
        }
        input, textarea, select, button.save-btn {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            box-sizing: border-box;
        }
        button.save-btn {
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .project-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            background: #fafafa;
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            color: white;
            font-size: 12px;
            margin-top: 8px;
        }
        .ongoing { background: orange; }
        .completed { background: green; }
        .planned { background: gray; }
        #msg {
            margin-top: 10px;
            color: green;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-box">
        <button class="back-btn" onclick="location.href='dashboard.html'">Back to Dashboard</button>
        <h2>Upload Project</h2>
        <input type="text" id="title" placeholder="Project Title" onkeydown="moveNext(event, 'desc')">
        <textarea id="desc" placeholder="Project Description" onkeydown="moveNext(event, 'tech')"></textarea>
        <input type="text" id="tech" placeholder="Technology Used" onkeydown="moveNext(event, 'link')">
        <input type="text" id="link" placeholder="Project Link" onkeydown="moveNext(event, 'status')">
        <select id="status" onkeydown="handleLastField(event)">
            <option value="ongoing">Ongoing</option>
            <option value="completed">Completed</option>
            <option value="planned">Planned</option>
        </select>
        <button class="save-btn" onclick="saveProject()">Save Project</button>
        <div id="msg"></div>
    </div>

    <div class="details-box">
        <h2>Project Details</h2>
        <div id="projectList"></div>
    </div>
</div>

<script>
    function moveNext(event, nextId) {
        if (event.key === 'Enter') {
            event.preventDefault();
            document.getElementById(nextId).focus();
        }
    }

    function handleLastField(event) {
        if (event.key === 'Enter') {
            event.preventDefault();
            saveProject();
        }
    }

    function saveProject() {
        let title = document.getElementById('title').value.trim();
        let desc = document.getElementById('desc').value.trim();
        let tech = document.getElementById('tech').value.trim();
        let link = document.getElementById('link').value.trim();
        let status = document.getElementById('status').value;
        let msgBox = document.getElementById('msg');
        let profile = JSON.parse(localStorage.getItem('profile')) || {};
        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || {};

        if (title === '' || desc === '' || tech === '' || link === '') {
            alert('Please fill all fields');
            return;
        }

        // Capture current date
        const uploadDate = new Date().toLocaleDateString('en-GB');

        let projects = JSON.parse(localStorage.getItem('projects')) || [];
        
        // Added 'date' to the object
        projects.push({ 
            title, 
            desc, 
            tech, 
            link, 
            status, 
            date: uploadDate,
            userEmail: currentUser.email || profile.email || "",
            name: profile.name || "",
            year: profile.year || "",
            pid: profile.pid || "",
            clgId: profile.clgId || "",
            studentDetails: {
                name: profile.name || "",
                email: currentUser.email || profile.email || "",
                pid: profile.pid || "",
                clgId: profile.clgId || "",
                year: profile.year || ""
            }
        });

        localStorage.setItem('projects', JSON.stringify(projects));
        msgBox.innerText = 'Project saved successfully!';

        document.getElementById('title').value = '';
        document.getElementById('desc').value = '';
        document.getElementById('tech').value = '';
        document.getElementById('link').value = '';
        document.getElementById('status').value = 'ongoing';
        loadProjects();
    }

    function loadProjects() {
        let projects = JSON.parse(localStorage.getItem('projects')) || [];
        let list = document.getElementById('projectList');
        list.innerHTML = '';

        if (projects.length === 0) {
            list.innerHTML = '<p>No projects saved yet.</p>';
            return;
        }

        projects.forEach((project) => {
            list.innerHTML += `
                <div class="project-card">
                    <div style="display:flex; justify-content:space-between;">
                        <h3>${project.title}</h3>
                        <small style="color: #888;">📅 ${project.date || 'New'}</small>
                    </div>
                    <p><b>Description:</b> ${project.desc}</p>
                    <p><b>Technology Used:</b> ${project.tech}</p>
                    <p><b>Project Link:</b> <a href="${project.link}" target="_blank">${project.link}</a></p>
                    <span class="badge ${project.status}">${project.status}</span>
                </div>
            `;
        });
    }

    window.onload = loadProjects;
</script>

</body>
</html>
